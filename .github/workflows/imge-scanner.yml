#Trivy is a popular open-source vulnerability scanner for container images. It can be used to scan Docker images for known vulnerabilities in the operating system packages and application dependencies. Below is an example of a GitHub Actions workflow that uses Trivy to scan a Docker image.
name: Image Scanner

on:
    workflow_call:
    

jobs:
    image-scanner:
        runs-on: ubuntu-latest
        steps:
            - name: Login to Docker Hub
              uses: docker/login-action@v3
              with:
                  username: ${{ vars.DOCKERHUB_USERNAME }}
                  password: ${{ secrets.DOCKERHUB_TOKEN }}

            - name: Scan Docker Image with Trivy
              uses: aquasecurity/trivy-action@0.33.1
              with:
                  image-ref: ${{ vars.DOCKERHUB_USERNAME }}/flask-app:latest
                  exit-code: '1'
                  severity: 'HIGH,CRITICAL'